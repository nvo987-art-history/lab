<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NV0987 Lab</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<header>
<h1>NV0987 Lab</h1>
<p>Experimental Research Node</p>
</header>

<main id="content"></main>

<script>
const path = window.location.pathname;

const routes = {
  "/experiments/ai-agents/": "AI Agents research module.",
  "/experiments/knowledge-graph/": "Knowledge graph experiments.",
  "/experiments/semantic-web/": "Semantic web infrastructure experiments.",
  "/experiments/verifiable-credentials/": "Verifiable credentials research.",

  "/prototypes/research-tools/": "Research tools prototype.",
  "/prototypes/data-visualization/": "Data visualization prototype.",
  "/prototypes/ai-systems/": "AI systems prototype.",

  "/datasets/experimental/": "Experimental datasets.",
  "/datasets/graph-data/": "Graph datasets.",

  "/docs/architecture/": "System architecture.",
  "/docs/protocols/": "Protocols.",
  "/docs/lab-manifesto/": "Lab manifesto."
};

const content = document.getElementById("content");

if (routes[path]) {
  content.innerHTML = `<h2>${path}</h2><p>${routes[path]}</p>`;
} else {
  content.innerHTML = `
    <h2>Page not found</h2>
    <p>This route is part of NV0987 Lab but not yet implemented.</p>
  `;
}
</script>

</body>
</html>
